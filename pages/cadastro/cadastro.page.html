<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Cadastro de Usuário</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Nome</ion-label>
    <ion-input [(ngModel)]="usuario.nome" type="text"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Login</ion-label>
    <ion-input [(ngModel)]="usuario.login" type="text"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Senha</ion-label>
    <ion-input [(ngModel)]="usuario.senha" type="password"></ion-input>
  </ion-item>

  <div class="ion-padding-top">
    <ion-button expand="block" color="primary" (click)="salvar()">SALVAR</ion-button>
  </div>
</ion-content>
